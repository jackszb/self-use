name: 编译规则集

on:
  push:
    branches:
      - main
    paths:
      - 'rules/**/*.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 创建 rules 目录
        run: |
          mkdir -p rules

      - name: 安装 sing-box
        run: |
          curl -fsSL https://sing-box.app/install.sh | sh -s -- --version 1.13.14
          sing-box version

      - name: 找出需要编译的 JSON 文件
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            files=$(find rules -name '*.json' | sort)
          elif git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            files=$(git diff --name-only --diff-filter=ACMR \
              ${{ github.event.before }} ${{ github.sha }} -- 'rules/**/*.json' | sort)
          else
            files=$(find rules -name '*.json' | sort)
          fi

          resolved=""
          for f in $files; do
            if [ -f "$f" ]; then
              resolved="$resolved $f"
            fi
          done

          echo "files=$resolved" >> "$GITHUB_OUTPUT"
          echo "count=$(echo $resolved | wc -w)" >> "$GITHUB_OUTPUT"

          if [ -z "$resolved" ]; then
            echo "没有需要编译的 JSON 文件，跳过。"
          else
            echo "待编译文件:"
            echo "$resolved"
          fi

      - name: 编译 JSON → SRS
        if: steps.changed.outputs.count > 0
        run: |
          for file in ${{ steps.changed.outputs.files }}; do
            echo "::group::编译 $file"
            sing-box rule-set compile "$file" -o "${file%.json}.srs"
            echo "::endgroup::"
          done

      - name: 提交 SRS 文件
        if: steps.changed.outputs.count > 0
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rules/*.srs

          if git diff --cached --quiet; then
            echo "SRS 文件无变化，跳过提交。"
          else
            git commit -m "chore: 自动编译规则集 [skip ci]"
            git push
          fi
